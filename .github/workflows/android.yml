name: Android CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          # Get the last tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          if [ -z "$PREVIOUS_TAG" ]; then
            # No previous tag, get all commits
            git log --pretty=format:"* %s (%h)" HEAD >> $GITHUB_OUTPUT
          else
            # Get commits since the last tag
            git log --pretty=format:"* %s (%h)" $PREVIOUS_TAG..HEAD >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Get Version Name
        id: version
        run: |
          VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "1.0")
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE secret is missing. Skipping signing."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          
          # Find the latest apksigner in the Android SDK
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
          
          # Find the unsigned APK
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          
          $APKSIGNER sign --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            $UNSIGNED_APK
          
          # Delete the unsigned APK once signed
          rm "$UNSIGNED_APK"

      - name: Prepare APK for upload
        run: |
          VERSION_NAME="${{ steps.version.outputs.VERSION_NAME }}.${{ github.run_number }}"
          if [ -f app/build/outputs/apk/release/app-release-signed.apk ]; then
            mv app/build/outputs/apk/release/app-release-signed.apk "YoutubeMusicApp-v${VERSION_NAME}.apk"
          else
            mv app/build/outputs/apk/release/*.apk "YoutubeMusicApp-v${VERSION_NAME}-unsigned.apk"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YoutubeMusicApp-Release
          path: "*.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION_NAME }}.${{ github.run_number }}
          name: Release v${{ steps.version.outputs.VERSION_NAME }}.${{ github.run_number }}
          body: |
            ### Changes in this release:
            ${{ steps.changelog.outputs.CHANGES }}
          files: "*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
